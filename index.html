<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneVote</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #ffffff;
            --ready: #00ff88;
            --waiting: #444444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: white; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .container { width: 100%; max-width: 400px; flex-grow: 1; }
        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1.5px; color: var(--accent); }
        .subtitle { color: #666; margin: 5px 0 0 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Affichage en liste (les unes au-dessus des autres) */
        .list { display: flex; flex-direction: column; gap: 12px; }
        
        .card { 
            background: var(--card); padding: 15px 20px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #1a1a1a; transition: all 0.3s ease;
        }
        .card.ready { border-color: var(--ready); background: #001a0e; }
        
        .info { text-align: left; }
        .site-label { font-size: 0.65rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .ready .site-label { color: var(--ready); }
        
        .time { font-size: 1.1rem; font-family: "SF Mono", monospace; font-weight: 700; color: var(--waiting); }
        .ready .time { color: var(--ready); }
        
        button { 
            background: #1a1a1a; color: #888; border: none; 
            padding: 10px 20px; border-radius: 10px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .ready button { background: var(--ready); color: black; }
        
        footer { 
            margin-top: 40px; padding: 20px; font-size: 0.65rem; 
            color: #333; text-transform: uppercase; letter-spacing: 3px; font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ONEVOTE</h1>
            <p class="subtitle">OneBlock France Tracker</p>
        </header>

        <div class="list" id="tracker-list"></div>
    </div>

    <footer>
        LICENSE BY CLEMANT • V1.2
    </footer>

    <script>
        const sites = [
            { id: 1, name: "Site Principal", duration: 24 * 60 * 60 },
            { id: 2, name: "Liste Serveur 1", duration: 90 * 60 },
            { id: 3, name: "Liste Serveur 2", duration: 120 * 60 },
            { id: 4, name: "Liste Serveur 3", duration: 180 * 60 },
            { id: 5, name: "Liste Serveur 4", duration: 90 * 60 },
            { id: 6, name: "Liste Serveur 5", duration: 90 * 60 }
        ];

        if ("Notification" in window) Notification.requestPermission();

        function createCards() {
            const list = document.getElementById('tracker-list');
            sites.forEach(site => {
                const endTime = localStorage.getItem(`site_${site.id}`);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${site.id}`;
                card.innerHTML = `
                    <div class="info">
                        <div class="site-label">${site.name}</div>
                        <div class="time" id="time-${site.id}">READY</div>
                    </div>
                    <button onclick="vote(${site.id}, ${site.duration})">VOTER</button>
                `;
                list.appendChild(card);
                if (endTime) startTimer(site.id, endTime);
            });
        }

        function vote(id, duration) {
            const endTime = Date.now() + duration * 1000;
            localStorage.setItem(`site_${id}`, endTime);
            startTimer(id, endTime);
            window.open('https://oneblockfrance.fr/vote', '_blank');
        }

        function startTimer(id, endTime) {
            const timerDisplay = document.getElementById(`time-${id}`);
            const card = document.getElementById(`card-${id}`);
            
            const interval = setInterval(() => {
                const now = Date.now();
                const diff = endTime - now;

                if (diff <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerText = "READY";
                    card.classList.add('ready');
                    if (Notification.permission === "granted") {
                        new Notification("VOTE DISPONIBLE", { body: `Le vote pour ${sites[id-1].name} est prêt !` });
                    }
                } else {
                    card.classList.remove('ready');
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    timerDisplay.innerText = `${h}h ${m}m ${s}s`;
                }
            }, 1000);
        }

        createCards();
    </script>
</body>
    </html>
