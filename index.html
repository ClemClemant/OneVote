<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneVote</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #ffffff;
            --ready: #00ff88;
            --waiting: #444444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: white; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            box-sizing: border-box;
        }
        .container { width: 100%; max-width: 400px; padding-bottom: 60px; }
        header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1.5px; color: var(--accent); }
        .subtitle { color: #666; margin: 5px 0 0 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .list { display: flex; flex-direction: column; gap: 10px; }
        
        .card { 
            background: var(--card); padding: 12px 18px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #1a1a1a; transition: all 0.3s ease;
            min-height: 55px;
        }
        .card.ready { border-color: var(--ready); background: #001a0e; }
        
        .info { text-align: left; }
        .site-label { font-size: 0.65rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .ready .site-label { color: var(--ready); }
        
        .time { font-size: 1.1rem; font-family: "SF Mono", monospace; font-weight: 700; color: var(--waiting); }
        .ready .time { color: var(--ready); }
        
        button { 
            display: none;
            background: white; color: black; border: none; 
            padding: 10px 18px; border-radius: 10px; font-size: 0.7rem; font-weight: 800;
            cursor: pointer; transition: all 0.2s;
        }
        .ready button { display: block; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        /* Signature fixée en bas de l'écran */
        footer { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 0;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            font-size: 0.6rem; 
            color: #333; text-transform: uppercase; letter-spacing: 3px; font-weight: bold;
            text-align: center;
            pointer-events: none; /* Pour ne pas gêner les clics */
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ONEVOTE</h1>
            <p class="subtitle">OneBlock France Tracker</p>
        </header>

        <div class="list" id="tracker-list"></div>
    </div>

    <footer>
        LICENCE BY CLEMANT • V1.4
    </footer>

    <script>
        const sites = [
            { id: 1, name: "Site 1", duration: 86400 },
            { id: 2, name: "Site 2", duration: 5400 },
            { id: 3, name: "Site 3", duration: 7200 },
            { id: 4, name: "Site 4", duration: 10800 },
            { id: 5, name: "Site 5", duration: 5400 },
            { id: 6, name: "Site 6", duration: 5400 }
        ];

        if ("Notification" in window) Notification.requestPermission();

        function createCards() {
            const list = document.getElementById('tracker-list');
            sites.forEach(site => {
                const endTime = localStorage.getItem(`site_${site.id}`);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${site.id}`;
                card.innerHTML = `
                    <div class="info">
                        <div class="site-label">${site.name}</div>
                        <div class="time" id="time-${site.id}">READY</div>
                    </div>
                    <button onclick="vote(${site.id}, ${site.duration})">VOTER</button>
                `;
                list.appendChild(card);
                if (endTime) startTimer(site.id, endTime);
            });
        }

        function vote(id, duration) {
            const endTime = Date.now() + duration * 1000;
            localStorage.setItem(`site_${id}`, endTime);
            startTimer(id, endTime);
            window.open('https://oneblockfrance.fr/vote', 'oneblock_vote');
        }

        function startTimer(id, endTime) {
            const timerDisplay = document.getElementById(`time-${id}`);
            const card = document.getElementById(`card-${id}`);
            
            const interval = setInterval(() => {
                const now = Date.now();
                const diff = Math.floor((endTime - now) / 1000) * 1000;

                if (diff <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerText = "READY";
                    card.classList.add('ready');
                } else {
                    card.classList.remove('ready');
                    const totalSeconds = Math.floor(diff / 1000);
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    timerDisplay.innerText = `${h}h ${m}m ${s}s`;
                }
            }, 1000);
        }

        createCards();
    </script>
</body>
</html>
