<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneVote</title>
    <style>
        :root { --bg: #050505; --card: #111111; --ready: #00ff88; --waiting: #444444; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 400px; padding-bottom: 80px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1.5px; }
        .subtitle { color: #666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        #notif-btn { background: #1a1a1a; color: #00ff88; border: 1px solid #00ff88; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .list { display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--card); padding: 12px 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; min-height: 60px; }
        .card.ready { border-color: var(--ready); background: #001a0e; }
        .site-label { font-size: 0.65rem; color: #555; font-weight: bold; }
        .ready .site-label { color: var(--ready); }
        .time { font-size: 1.1rem; font-family: monospace; font-weight: bold; color: var(--waiting); }
        .ready .time { color: var(--ready); }
        button { display: none; background: white; color: black; border: none; padding: 10px 18px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; cursor: pointer; }
        .ready button { display: block; }
        footer { position: fixed; bottom: 0; width: 100%; padding: 15px 0; font-size: 0.6rem; color: #333; text-align: center; letter-spacing: 3px; font-weight: bold; background: var(--bg); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ONEVOTE</h1>
            <p class="subtitle">OneBlock France Tracker</p>
        </header>
        <button id="notif-btn" onclick="enableNotifs()">🔔 ACTIVER LES ALERTES (CLIQUE ICI)</button>
        <div class="list" id="tracker-list"></div>
    </div>
    <footer>LICENCE BY CLEMANT • V1.4</footer>
    <script>
        const sites = [
            { id: 1, name: "Site 1", duration: 86400 },
            { id: 2, name: "Site 2", duration: 5400 },
            { id: 3, name: "Site 3", duration: 7200 },
            { id: 4, name: "Site 4", duration: 10800 },
            { id: 5, name: "Site 5", duration: 5400 },
            { id: 6, name: "Site 6", duration: 5400 }
        ];

        function enableNotifs() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        alert("Alertes activées !");
                        document.getElementById('notif-btn').style.display = 'none';
                    } else {
                        alert("Permission refusée. Vérifie les réglages de ton navigateur.");
                    }
                });
            }
        }

        function createCards() {
            const list = document.getElementById('tracker-list');
            list.innerHTML = "";
            sites.forEach(site => {
                const endTime = localStorage.getItem(`site_${site.id}`);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${site.id}`;
                card.innerHTML = `<div class="info"><div class="site-label">${site.name}</div><div class="time" id="time-${site.id}">READY</div></div><button onclick="vote(${site.id}, ${site.duration})">VOTER</button>`;
                list.appendChild(card);
                if (endTime && endTime > Date.now()) { startTimer(site.id, endTime); } 
                else { card.classList.add('ready'); }
            });
        }

        function vote(id, duration) {
            const endTime = Date.now() + (duration * 1000);
            localStorage.setItem(`site_${id}`, endTime);
            startTimer(id, endTime);
            window.open('https://oneblockfrance.fr/vote', 'oneblock_vote');
        }

        function startTimer(id, endTime) {
            const timerDisplay = document.getElementById(`time-${id}`);
            const card = document.getElementById(`card-${id}`);
            if (!card) return;
            card.classList.remove('ready');
            const interval = setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerText = "READY";
                    card.classList.add('ready');
                    if (Notification.permission === "granted") {
                        new Notification("VOTE DISPONIBLE", { body: `Le Site ${id} est prêt !`, icon: "https://oneblockfrance.fr/favicon.ico" });
                    }
                } else {
                    const s = Math.floor(diff / 1000);
                    const h = Math.floor(s / 3600);
                    const m = Math.floor((s % 3600) / 60);
                    timerDisplay.innerText = `${h}h ${m}m ${s % 60}s`;
                }
            }, 1000);
        }
        if (Notification.permission === "granted") { document.getElementById('notif-btn').style.display = 'none'; }
        createCards();
    </script>
</body>
</html>
