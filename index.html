<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OneVote</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { --bg: #050505; --card: #111111; --ready: #00ff88; --waiting: #444444; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .container { width: 100%; max-width: 420px; padding-bottom: 50px; }
        header { text-align: center; margin-bottom: 15px; }
        h1 { font-size: 2rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .subtitle { color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
        .list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .card { background: var(--card); padding: 12px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; min-height: 62px; }
        .card.ready { border-color: var(--ready); background: #001a0e; }
        .site-label { font-size: 0.7rem; color: #555; font-weight: bold; text-transform: uppercase; }
        .ready .site-label { color: var(--ready); }
        .time { font-size: 1.15rem; font-family: monospace; font-weight: bold; color: var(--waiting); }
        .ready .time { color: var(--ready); }
        button { display: none; background: white; color: black; border: none; padding: 10px 18px; border-radius: 11px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .ready button { display: block; }
        footer { position: fixed; bottom: 0; width: 100%; padding: 12px 0; font-size: 0.6rem; color: #333; text-align: center; letter-spacing: 2px; background: var(--bg); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ONEVOTE</h1>
            <p class="subtitle">Tracker Officiel</p>
        </header>
        <div class="list" id="tracker-list"></div>
    </div>

    <footer>V1.5.0 BY CLEMANT</footer>

    <script>
        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
        }

        const sites = [
            {id:1, n:"Site 1", d:86400},
            {id:2, n:"Site 2", d:5400},
            {id:3, n:"Site 3", d:7200},
            {id:4, n:"Site 4", d:10800},
            {id:5, n:"Site 5", d:5400},
            {id:6, n:"Site 6", d:5400}
        ];

        function createCards() {
            const list = document.getElementById('tracker-list');
            if (!list) return;
            list.innerHTML = "";
            
            sites.forEach(s => {
                const end = localStorage.getItem('site_'+s.id);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'card-'+s.id;
                card.innerHTML = `
                    <div class="info">
                        <div class="site-label">${s.n}</div>
                        <div class="time" id="time-${s.id}">READY</div>
                    </div>
                    <button onclick="vote(${s.id}, ${s.d})">VOTER</button>
                `;
                list.appendChild(card);

                if (end && parseInt(end) > Date.now()) {
                    startTimer(s.id, parseInt(end));
                } else {
                    card.classList.add('ready');
                }
            });
        }

        async function vote(id, duration) {
            const end = Date.now() + (duration * 1000);
            localStorage.setItem('site_'+id, end);
            startTimer(id, end);
            
            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === "granted" && 'serviceWorker' in navigator) {
                    const reg = await navigator.serviceWorker.ready;
                    reg.active.postMessage({
                        action: 'SCHEDULE_NOTIFICATION',
                        siteId: id,
                        siteName: sites.find(s => s.id === id).n,
                        delay: duration * 1000
                    });
                }
            }
            window.open('https://oneblockfrance.fr/vote', '_blank');
        }

        function startTimer(id, end) {
            const timeDisplay = document.getElementById('time-'+id);
            const card = document.getElementById('card-'+id);
            if(!card || !timeDisplay) return;

            card.classList.remove('ready');

            const interval = setInterval(() => {
                const remaining = end - Date.now();
                if (remaining <= 0) {
                    clearInterval(interval);
                    timeDisplay.innerText = "READY";
                    card.classList.add('ready');
                } else {
                    const s = Math.floor(remaining / 1000);
                    const h = Math.floor(s / 3600);
                    const m = Math.floor((s % 3600) / 60);
                    const sec = s % 60;
                    timeDisplay.innerText = h + "h " + m + "m " + sec + "s";
                }
            }, 1000);
        }

        // Lancement de l'affichage
        createCards();
    </script>
</body>
</html>
