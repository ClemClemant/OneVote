<script>
// 1. Enregistrement du Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// 2. Fonction pour demander la permission (à appeler au clic sur un bouton)
function requestNotificationPermission() {
    Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
            console.log('Notification autorisée');
        }
    });
}

// 3. TA FONCTION DE CHRONO (à adapter selon ton code)
// Quand le chrono commence, on envoie l'info au Service Worker
function startTimer(minutes) {
    const ms = minutes * 60 * 1000;
    
    // On prévient le Service Worker de sonner dans X minutes
    if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
            type: 'START_TIMER',
            delay: ms
        });
    }
    
    // Ici, garde ton code actuel pour l'affichage visuel du chrono
}
</script>
