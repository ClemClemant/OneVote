<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneVote Multi</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #050505; color: white; font-family: sans-serif; text-align: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }
        h1 { margin-bottom: 30px; letter-spacing: 2px; }
        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            width: 90%; max-width: 450px; 
        }
        .btn-vote { 
            background: white; color: black; border: none; border-radius: 15px; 
            padding: 25px 10px; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        .btn-vote:active { transform: scale(0.95); }
        .btn-label { font-size: 1.1rem; }
        .btn-timer { color: #888; font-size: 0.9rem; margin-top: 8px; font-family: monospace; }
        .status { color: #444; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
<body>

    <h1>OneVote</h1>
    
    <div class="grid">
        <button class="btn-vote" onclick="handleButtonClick(90, 'btn1', '1h30')">
            <span class="btn-label">VOTE 1h30</span>
            <span class="btn-timer" id="btn1">--:--:--</span>
        </button>

        <button class="btn-vote" onclick="handleButtonClick(120, 'btn2', '2h')">
            <span class="btn-label">VOTE 2h</span>
            <span class="btn-timer" id="btn2">--:--:--</span>
        </button>

        <button class="btn-vote" onclick="handleButtonClick(180, 'btn3', '3h')">
            <span class="btn-label">VOTE 3h</span>
            <span class="btn-timer" id="btn3">--:--:--</span>
        </button>

        <button class="btn-vote" onclick="handleButtonClick(1440, 'btn4', '24h')">
            <span class="btn-label">VOTE 24h</span>
            <span class="btn-timer" id="btn4">--:--:--</span>
        </button>
    </div>

    <p class="status" id="status">Prêt pour le vote ✅</p>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const activeIntervals = {};

        function handleButtonClick(mins, btnId, label) {
            // 1. Demande de permission et lancement immédiat du décompte
            Notification.requestPermission().then(perm => {
                const ms = mins * 60 * 1000;
                const endTime = Date.now() + ms;
                localStorage.setItem(btnId, endTime);

                startVisualTimer(btnId, endTime);

                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'START_TIMER',
                        delay: ms,
                        label: label
                    });
                }

                // 2. Redirection directe (méthode standard pour éviter les blocages de sécurité d'Android)
                window.open('https://oneblockfrance.fr/vote', '_blank');
            });
        }

        function startVisualTimer(btnId, endTime) {
            const display = document.getElementById(btnId);
            if (activeIntervals[btnId]) clearInterval(activeIntervals[btnId]);

            activeIntervals[btnId] = setInterval(() => {
                const diff = endTime - Date.now();

                if (diff <= 0) {
                    clearInterval(activeIntervals[btnId]);
                    display.innerText = "VOTEZ !";
                    display.style.color = "#ff4444";
                    return;
                }

                display.style.color = "#888";
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                display.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        window.onload = () => {
            ['btn1', 'btn2', 'btn3', 'btn4'].forEach(id => {
                const savedEnd = localStorage.getItem(id);
                if (savedEnd && parseInt(savedEnd) > Date.now()) {
                    startVisualTimer(id, parseInt(savedEnd));
                } else if (savedEnd) {
                    document.getElementById(id).innerText = "VOTEZ !";
                    document.getElementById(id).style.color = "#ff4444";
                }
            });
        };
    </script>
</body>
</html>
